# ===
# Default system configuration
# Sections mirror crates/domain/src/config/*.rs
# Override per-env in development.toml / production.toml
# ===

# ===
# system
# ===
[system]
name      = "temp-rs-ddd"
version   = "0.1.0"
region    = "ap-southeast-1"
shard_id  = "shard-0"
timezone  = "UTC"
mode      = "development"  # development | staging | production

# ===
# interfaces — inbound (this service exposes these)
# ===

# --- HTTP server ---
[interfaces.http_server.network]
host = "0.0.0.0"
port = 8080

[interfaces.http_server.worker]
worker_threads  = 8
max_connections = 10000
backlog         = 1024

[interfaces.http_server.timeouts]
read_timeout_ms     = 30000
write_timeout_ms    = 30000
idle_timeout_ms     = 60000
shutdown_timeout_ms = 15000

[interfaces.http_server.limits]
max_body_size   = 10485760  # 10 MiB
max_header_size = 16384     # 16 KiB

[interfaces.http_server.tcp]
http2_enabled = true
tcp_nodelay   = true

[interfaces.http_server.security.cors]
enabled               = true
allow_credentials     = true
max_age_secs          = 3600
allow_private_network = false

[interfaces.http_server.security.cors.origin]
allowed_origins  = ["http://localhost:3000"]
allow_any_origin = false

[interfaces.http_server.security.cors.methods]
allowed_methods   = ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
allow_any_method  = false

[interfaces.http_server.security.cors.headers]
allowed_headers  = ["content-type", "authorization", "x-request-id"]
allow_any_header = false
exposed_headers  = ["x-request-id"]

[interfaces.http_server.security.tls]
is_enabled          = false
cert_file           = "certs/http/server.crt"
key_file            = "certs/http/server.key"
require_client_cert = false
min_version         = "TLS1.2"

# --- gRPC server ---
[interfaces.grpc_server.network]
host = "0.0.0.0"
port = 9090

[interfaces.grpc_server.worker]
worker_threads                   = 8
max_connections                  = 10000
concurrency_limit_per_connection = 256
backlog                          = 1024

[interfaces.grpc_server.timeouts]
request_timeout_ms  = 30000
connect_timeout_ms  = 5000
idle_timeout_ms     = 300000
shutdown_timeout_ms = 15000

[interfaces.grpc_server.limits]
max_decoding_message_size = 4194304   # 4 MiB
max_encoding_message_size = 4194304   # 4 MiB
max_frame_size            = 16384

[interfaces.grpc_server.http2]
initial_stream_window_size     = 65535
initial_connection_window_size = 1048576
max_concurrent_streams         = 1000

[interfaces.grpc_server.keepalive]
http2_keepalive_interval_ms = 30000
http2_keepalive_timeout_ms  = 10000
http2_adaptive_window       = true
tcp_keepalive_ms            = 60000

[interfaces.grpc_server.tcp]
tcp_nodelay = true

[interfaces.grpc_server.protocol]
accept_http1          = false
reflection_enabled    = true
health_check_enabled  = true

[interfaces.grpc_server.security.tls]
is_enabled          = false
cert_file           = "certs/grpc/server.crt"
key_file            = "certs/grpc/server.key"
require_client_cert = false
min_version         = "TLS1.2"

# --- WebSocket server ---
[interfaces.ws_server.network]
host = "0.0.0.0"
port = 8081
path = "/ws"

[interfaces.ws_server.worker]
worker_threads          = 8
max_connections         = 50000
max_connections_per_ip  = 100
backlog                 = 1024

[interfaces.ws_server.timeouts]
handshake_timeout_ms = 5000
read_timeout_ms      = 60000
write_timeout_ms     = 10000
idle_timeout_ms      = 300000
shutdown_timeout_ms  = 15000

[interfaces.ws_server.heartbeat]
ping_interval_ms = 30000
pong_timeout_ms  = 10000

[interfaces.ws_server.limits]
max_message_size         = 1048576  # 1 MiB
max_frame_size           = 65536    # 64 KiB
max_messages_per_second  = 100

[interfaces.ws_server.protocol]
subprotocols            = []
permessage_deflate      = true
auto_fragment           = true
accept_unmasked_frames  = false

[interfaces.ws_server.tcp]
tcp_nodelay   = true
tcp_keepalive = true

[interfaces.ws_server.security]
allowed_origins = ["http://localhost:3000"]

[interfaces.ws_server.security.cors]
enabled               = true
allow_credentials     = true
max_age_secs          = 3600
allow_private_network = false

[interfaces.ws_server.security.cors.origin]
allowed_origins  = ["http://localhost:3000"]
allow_any_origin = false

[interfaces.ws_server.security.cors.methods]
allowed_methods  = ["GET"]
allow_any_method = false

[interfaces.ws_server.security.cors.headers]
allowed_headers  = ["content-type", "authorization"]
allow_any_header = false
exposed_headers  = []

[interfaces.ws_server.security.tls]
is_enabled          = false
cert_file           = "certs/ws/server.crt"
key_file            = "certs/ws/server.key"
require_client_cert = false
min_version         = "TLS1.2"

# --- Kafka consumer ---
[interfaces.kafka_consumer.group]
group_id = "temp-rs-ddd"
# group_instance_id = "instance-0"

[interfaces.kafka_consumer.offset]
auto_offset_reset        = "latest"   # earliest | latest | none
enable_auto_commit       = false
auto_commit_interval_ms  = 5000
isolation_level          = "read_committed"

[interfaces.kafka_consumer.fetch]
fetch_min_bytes            = 1
fetch_max_bytes            = 52428800   # 50 MiB
fetch_max_wait_ms          = 500
max_partition_fetch_bytes  = 1048576    # 1 MiB
max_poll_records           = 500
max_poll_interval_ms       = 300000

[interfaces.kafka_consumer.session]
session_timeout_ms    = 45000
heartbeat_interval_ms = 3000

[interfaces.kafka_consumer.concurrency]
worker_threads      = 4
channel_buffer_size = 1024

# ===
# repository — datastores
# ===

# --- PostgreSQL ---
[repository.postgresql]
appname = "temp-rs-ddd"
tz      = "UTC"

[repository.postgresql.connection]
address  = ["127.0.0.1:5432"]
database = "app"
username = "app"
password = "app"

[repository.postgresql.tls]
is_enabled          = false
cert_file           = "certs/pg/client.crt"
key_file            = "certs/pg/client.key"
require_client_cert = false
min_version         = "TLS1.2"

[repository.postgresql.timeouts]
connection_timeout          = 5
statement_timeout           = 30
idle_in_transaction_timeout = 60

[repository.postgresql.pool]
max_conns                = 20
min_conns                = 2
min_idle_conns           = 2
max_conn_idle_time       = 300
max_conn_lifetime        = 1800
max_conn_lifetime_jitter = 60
health_check_period      = 30

# --- Redis ---
[repository.redis]
type        = "standalone"   # standalone | sentinel | cluster
username    = ""
password    = ""
db          = 0
client_name = "temp-rs-ddd"

[repository.redis.tls]
is_enabled          = false
cert_file           = "certs/redis/client.crt"
key_file            = "certs/redis/client.key"
require_client_cert = false
min_version         = "TLS1.2"

[repository.redis.standalone]
host = "127.0.0.1"
port = 6379

# [repository.redis.sentinel]
# master_name       = "mymaster"
# sentinel_addrs    = ["127.0.0.1:26379"]
# sentinel_username = ""
# sentinel_password = ""

# [repository.redis.cluster]
# cluster_addrs    = ["127.0.0.1:7000", "127.0.0.1:7001"]
# route_by_latency = true
# route_randomly   = false
# read_only        = false
# max_redirects    = 3

[repository.redis.timeouts]
dial_timeout  = 5
read_timeout  = 3
write_timeout = 3
pool_timeout  = 4

[repository.redis.pool]
pool_size          = 50
min_idle_conns     = 5
max_idle_conns     = 20
pool_fifo          = false
conn_max_idle_time = 300
conn_max_lifetime  = 1800

[repository.redis.retry]
max_retries       = 3
min_retry_backoff = 8
max_retry_backoff = 512

# --- Object storage ---
[repository.object_storage]
type              = "s3"
bucket_name       = "app-bucket"
region            = "ap-southeast-1"
endpoint          = "http://127.0.0.1:9000"
force_path_style  = true
access_key_id     = "minioadmin"
secret_access_key = "minioadmin"
session_token     = ""

[repository.object_storage.tls]
is_enabled          = false
cert_file           = "certs/s3/client.crt"
key_file            = "certs/s3/client.key"
require_client_cert = false
min_version         = "TLS1.2"

[repository.object_storage.timeouts]
connect_timeout_ms   = 5000
request_timeout_ms   = 30000
operation_timeout_ms = 60000
idle_timeout_ms      = 90000

[repository.object_storage.pool]
max_idle_connections     = 32
max_connections_per_host = 64
keep_alive_ms            = 60000

[repository.object_storage.retry]
max_retries    = 3
min_backoff_ms = 100
max_backoff_ms = 5000
use_jitter     = true

[repository.object_storage.upload]
multipart_threshold   = 8388608    # 8 MiB
multipart_chunk_size  = 8388608    # 8 MiB
multipart_concurrency = 4
max_object_size       = 5368709120 # 5 GiB

[repository.object_storage.download]
chunk_size  = 8388608  # 8 MiB
concurrency = 4

[repository.object_storage.server_side]
encryption         = "none"   # none | aes256 | aws:kms
kms_key_id         = ""
storage_class      = "STANDARD"
checksum_algorithm = "CRC32"

[repository.object_storage.options]
enable_compression  = false
enable_acceleration = false
addressing_style    = "path"   # path | virtual
user_agent          = "temp-rs-ddd/0.1.0"

# --- ScyllaDB ---
[repository.scylladb.cluster]
contact_points   = ["127.0.0.1:9042"]
keyspace         = "app"
local_dc         = "datacenter1"
protocol_version = 4
compression      = "lz4"   # none | snappy | lz4

[repository.scylladb.authentication]
username = "cassandra"
password = "cassandra"

[repository.scylladb.ssl]
enabled           = false
ca_cert_path      = "certs/scylla/ca.crt"
user_cert_path    = "certs/scylla/user.crt"
user_key_path     = "certs/scylla/user.key"
validate_hostname = true
cipher_suites     = []

[repository.scylladb.consistency]
default = "LOCAL_QUORUM"
serial  = "LOCAL_SERIAL"

[repository.scylladb.timeouts]
connect_timeout_ms          = 5000
request_timeout_ms          = 10000
schema_agreement_timeout_ms = 60000

[repository.scylladb.pool]
connections_per_host_local  = 2
connections_per_host_remote = 1
max_requests_per_connection = 1024
keepalive_interval_ms       = 30000

[repository.scylladb.retry]
policy      = "default"   # default | downgrading | fallthrough
max_retries = 3

[repository.scylladb.speculative]
enabled                    = true
max_speculative_executions = 2
delay_ms                   = 500

[repository.scylladb.load_balancing]
policy                        = "token_aware"
shuffle_replicas              = true
allow_remote_dcs_for_local_cl = false

[repository.scylladb.reconnection]
policy        = "exponential"
base_delay_ms = 1000
max_delay_ms  = 60000

[repository.scylladb.prepared]
cache_size           = 10000
prepare_on_all_hosts = true

[repository.scylladb.query]
page_size       = 5000
fetch_size      = 5000
tracing_enabled = false

# ===
# clients — outbound (this service publishes / calls)
# ===

# --- Kafka publisher ---
# Topic names are code constants (infrastructure::connection::kafka_topics) — not configured here.
[clients.kafka_publisher.connection.cluster]
brokers   = ["127.0.0.1:9092"]
client_id = "temp-rs-ddd-publisher"

[clients.kafka_publisher.connection.timeouts]
connection_timeout_ms = 10000
request_timeout_ms    = 30000
socket_timeout_ms     = 60000

[clients.kafka_publisher.connection.retry]
retry_backoff_ms         = 100
reconnect_backoff_ms     = 50
reconnect_backoff_max_ms = 1000

# [clients.kafka_publisher.connection.sasl]
# mechanism = "SCRAM-SHA-512"
# username  = ""
# password  = ""

# [clients.kafka_publisher.connection.tls]
# is_enabled          = true
# cert_file           = "certs/kafka/client.crt"
# key_file            = "certs/kafka/client.key"
# require_client_cert = false
# min_version         = "TLS1.2"

[clients.kafka_publisher.producer]
compression_type = "lz4"
partitioner      = "default"

[clients.kafka_publisher.producer.reliability]
acks                                  = "all"
enable_idempotence                    = true
max_in_flight_requests_per_connection = 5
retries                               = 2147483647
delivery_timeout_ms                   = 120000

[clients.kafka_publisher.producer.batching]
batch_size       = 16384
linger_ms        = 10
buffer_memory    = 33554432
max_request_size = 1048576

# [clients.kafka_publisher.producer.transaction]
# transactional_id       = "temp-rs-ddd-tx"
# transaction_timeout_ms = 60000

# --- gRPC clients (internal services) ---

# --- defaults ---
[clients.grpc_clients.defaults.endpoint]
discovery = "dns"          # static | dns | consul | etcd | k8s
addresses = []

[clients.grpc_clients.defaults.connection]
connect_timeout_ms = 3000
initial_backoff_ms = 100
max_backoff_ms     = 5000
lazy_connect       = false
tcp_nodelay        = true

[clients.grpc_clients.defaults.timeouts]
request_timeout_ms  = 5000
stream_timeout_ms   = 0
shutdown_timeout_ms = 10000

[clients.grpc_clients.defaults.pool]
connections_per_endpoint              = 2
max_concurrent_streams_per_connection = 100
idle_timeout_ms                       = 300000

[clients.grpc_clients.defaults.keepalive]
http2_keepalive_interval_ms = 30000
http2_keepalive_timeout_ms  = 10000
keepalive_while_idle        = true
tcp_keepalive_ms            = 60000

[clients.grpc_clients.defaults.retry]
enabled                = true
max_attempts           = 3
initial_backoff_ms     = 50
max_backoff_ms         = 1000
backoff_multiplier     = 2.0
retryable_status_codes = ["UNAVAILABLE", "DEADLINE_EXCEEDED", "RESOURCE_EXHAUSTED"]
use_jitter             = true

[clients.grpc_clients.defaults.circuit_breaker]
enabled                = true
failure_threshold      = 20
success_threshold      = 5
open_state_duration_ms = 10000
rolling_window_ms      = 30000

[clients.grpc_clients.defaults.load_balancing]
policy = "round_robin"   # round_robin | pick_first | least_request | ring_hash

[clients.grpc_clients.defaults.limits]
max_decoding_message_size = 4194304
max_encoding_message_size = 4194304
max_frame_size            = 16384

[clients.grpc_clients.defaults.compression]
send_codec    = "gzip"
accept_codecs = ["gzip", "zstd"]

[clients.grpc_clients.defaults.tls]
is_enabled          = false
cert_file           = "certs/grpc/client.crt"
key_file            = "certs/grpc/client.key"
require_client_cert = false
min_version         = "TLS1.2"

# --- per-service: user-service ---
[clients.grpc_clients.services."user-service".endpoint]
discovery    = "dns"
addresses    = []
service_name = "user-service.internal:9090"
authority    = "user-service.internal"
service      = "com.example.user.UserService"

[clients.grpc_clients.services."user-service".connection]
connect_timeout_ms = 2000
initial_backoff_ms = 100
max_backoff_ms     = 3000
lazy_connect       = false
tcp_nodelay        = true

[clients.grpc_clients.services."user-service".timeouts]
request_timeout_ms  = 2000
stream_timeout_ms   = 0
shutdown_timeout_ms = 10000

[clients.grpc_clients.services."user-service".pool]
connections_per_endpoint              = 4
max_concurrent_streams_per_connection = 200
idle_timeout_ms                       = 300000

[clients.grpc_clients.services."user-service".keepalive]
http2_keepalive_interval_ms = 30000
http2_keepalive_timeout_ms  = 10000
keepalive_while_idle        = true
tcp_keepalive_ms            = 60000

[clients.grpc_clients.services."user-service".retry]
enabled                = true
max_attempts           = 3
initial_backoff_ms     = 50
max_backoff_ms         = 500
backoff_multiplier     = 2.0
retryable_status_codes = ["UNAVAILABLE", "DEADLINE_EXCEEDED"]
use_jitter             = true

[clients.grpc_clients.services."user-service".circuit_breaker]
enabled                = true
failure_threshold      = 20
success_threshold      = 5
open_state_duration_ms = 10000
rolling_window_ms      = 30000

[clients.grpc_clients.services."user-service".load_balancing]
policy = "round_robin"

[clients.grpc_clients.services."user-service".limits]
max_decoding_message_size = 4194304
max_encoding_message_size = 4194304
max_frame_size            = 16384

[clients.grpc_clients.services."user-service".compression]
send_codec    = "gzip"
accept_codecs = ["gzip", "zstd"]

[clients.grpc_clients.services."user-service".tls]
is_enabled          = false
cert_file           = "certs/grpc/client.crt"
key_file            = "certs/grpc/client.key"
require_client_cert = false
min_version         = "TLS1.2"

[clients.grpc_clients.services."user-service".auth]
scheme = "bearer"
header = "authorization"
token  = ""

# --- per-service: billing-service ---
[clients.grpc_clients.services."billing-service".endpoint]
discovery    = "static"
addresses    = ["billing-1.internal:9090", "billing-2.internal:9090"]
service_name = "billing-service"
service      = "com.example.billing.BillingService"

[clients.grpc_clients.services."billing-service".connection]
connect_timeout_ms = 3000
initial_backoff_ms = 200
max_backoff_ms     = 5000
lazy_connect       = false
tcp_nodelay        = true

[clients.grpc_clients.services."billing-service".timeouts]
request_timeout_ms  = 8000
stream_timeout_ms   = 0
shutdown_timeout_ms = 15000

[clients.grpc_clients.services."billing-service".pool]
connections_per_endpoint              = 2
max_concurrent_streams_per_connection = 100
idle_timeout_ms                       = 300000

[clients.grpc_clients.services."billing-service".keepalive]
http2_keepalive_interval_ms = 30000
http2_keepalive_timeout_ms  = 10000
keepalive_while_idle        = true
tcp_keepalive_ms            = 60000

[clients.grpc_clients.services."billing-service".retry]
enabled                = false
max_attempts           = 1
initial_backoff_ms     = 100
max_backoff_ms         = 1000
backoff_multiplier     = 2.0
retryable_status_codes = []
use_jitter             = true

[clients.grpc_clients.services."billing-service".circuit_breaker]
enabled                = true
failure_threshold      = 10
success_threshold      = 3
open_state_duration_ms = 15000
rolling_window_ms      = 30000

[clients.grpc_clients.services."billing-service".load_balancing]
policy = "least_request"

[clients.grpc_clients.services."billing-service".limits]
max_decoding_message_size = 8388608
max_encoding_message_size = 8388608
max_frame_size            = 16384

[clients.grpc_clients.services."billing-service".compression]
send_codec    = "gzip"
accept_codecs = ["gzip", "zstd"]

[clients.grpc_clients.services."billing-service".tls]
is_enabled          = true
cert_file           = "certs/grpc/client.crt"
key_file            = "certs/grpc/client.key"
require_client_cert = true
min_version         = "TLS1.3"

[clients.grpc_clients.services."billing-service".auth]
scheme = "mtls"

# ===
# telemetry — logger, metrics, tracing
# ===

# --- Logger ---
[telemetry.logger]
level            = "info" # trace | debug | info | warn | error
format           = ["json"] # json | console
output           = ["stdout", "file"]  # stdout | stderr | file
caller           = true
stacktrace_level = "error" # trace | debug | info | warn | error

[telemetry.logger.file]
enabled      = true
folder       = "logs"
filename     = "app.log"
max_size_mb  = 100
max_backups  = 7
max_age_days = 30
compress     = true

# --- Metrics ---
[telemetry.metrics]
enabled               = true
path                  = "/metrics"
port                  = 9091
host                  = "0.0.0.0"
namespace             = "temp_rs_ddd"
collect_interval_secs = 15

# --- Tracing ---
[telemetry.tracing]
enabled         = false
service_name    = "temp-rs-ddd"
service_version = "0.1.0"
otlp_endpoint   = "http://127.0.0.1:4317"
protocol        = "grpc"                       # grpc | http
sampling_ratio  = 1.0
propagation     = ["tracecontext", "baggage"]  # tracecontext | baggage | jaeger

[telemetry.tracing.batch]
max_queue_size        = 2048
max_export_batch_size = 512
schedule_delay_ms     = 5000
export_timeout_ms     = 30000

[telemetry.tracing.headers]
# "x-api-key" = ""
